<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayToy Mail Sender</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-stone-100 text-stone-900 antialiased">
  <main class="max-w-3xl mx-auto px-6 py-16">
    <div class="mb-8">
      <a href="/" class="inline-flex items-center gap-3 text-stone-500 hover:text-stone-900 transition-colors">
        <img src="/favicon.svg" alt="DayToy logo" class="w-10 h-10 rounded-2xl" />
        <span class="text-sm font-medium tracking-[0.18em] uppercase">Temporary Mail Sender</span>
      </a>
    </div>

    <section class="rounded-[28px] border border-stone-200 bg-white shadow-[0_24px_70px_rgba(28,25,23,0.08)] overflow-hidden">
      <div class="px-8 py-8 border-b border-stone-200 bg-gradient-to-br from-white via-stone-50 to-indigo-50">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-indigo-600 mb-3">Private utility</p>
        <h1 class="text-4xl font-semibold tracking-tight mb-3">Send from contact@daytoy.online</h1>
        <p class="text-stone-500 leading-relaxed max-w-2xl">
          Temporary protected sender for manual outbound email. Keep this page private and set a strong send key in Cloudflare Pages.
        </p>
      </div>

      <form id="sendForm" class="p-8 space-y-6">
        <div class="grid md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-2">Recipient</label>
            <input name="to" type="email" required placeholder="name@example.com" class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-2">Reply-To</label>
            <input name="replyTo" type="email" placeholder="optional@example.com" class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-2">Subject</label>
            <input name="subject" type="text" required placeholder="Subject" class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-sm font-medium text-stone-700 mb-2">Sender Name</label>
            <input name="senderName" type="text" value="DayToy" class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-2">Message</label>
          <textarea name="message" rows="10" required placeholder="Write your email here..." class="w-full rounded-3xl border border-stone-200 px-4 py-4 resize-y focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-2">Send Key</label>
          <input name="sendKey" type="password" required placeholder="Cloudflare SEND_MAIL_KEY" class="w-full rounded-2xl border border-stone-200 px-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" />
        </div>

        <div class="flex items-center gap-4 pt-2">
          <button id="sendBtn" type="submit" class="inline-flex items-center justify-center rounded-2xl bg-indigo-600 px-6 py-3.5 text-white font-medium hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            Send Email
          </button>
          <p id="status" class="text-sm text-stone-500 hidden"></p>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('sendForm');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      statusEl.className = 'text-sm text-stone-500 hidden';

      const payload = {
        to: form.to.value.trim(),
        replyTo: form.replyTo.value.trim(),
        subject: form.subject.value.trim(),
        senderName: form.senderName.value.trim(),
        message: form.message.value.trim(),
      };

      try {
        const response = await fetch('/api/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-send-key': form.sendKey.value,
          },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Unknown error');
        }

        statusEl.textContent = data.id ? `Sent successfully. Message ID: ${data.id}` : 'Sent successfully.';
        statusEl.className = 'text-sm text-emerald-600';
      } catch (error) {
        statusEl.textContent = `Failed to send: ${error.message}`;
        statusEl.className = 'text-sm text-red-600';
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Email';
        statusEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
